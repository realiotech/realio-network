syntax = "proto3";
package realiotech.realionetwork.rststaking;

option go_package = "github.com/realiotech/realio-network/x/rststaking/types";



message RstStake {
  string id = 1;
  string address = 2; 
  int64 rstAmount = 3; 
  int64 rioAmount = 4; 
  string incomingRstTxnHash = 5; 
  string fundedRioTxnHash = 6; 
  string rstOriginChain = 7; 
  string rstOriginAddress = 8; 
  int64 created = 9; 
  string status = 10; 
  string creator = 11;
}

