syntax = "proto3";
package realiotech.realionetwork.rststaking;

option go_package = "github.com/realiotech/realio-network/x/rststaking/types";


message RstStake {
  string creator = 1;
  string id = 2;
  string address = 3;
  int64 rstAmount = 4;
  int64 rioAmount = 5;
  string incomingRstTxnHash = 6;
  int64 created = 7;
  int64 updated = 8;
  enum Status {
    ACTIVE = 0;
    COMPLETE = 1;
  }
  string status = 9;
}

